title: "[Show and Tell]: "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        Share what you built with AgenticLens. Demos, notebooks, blog posts, talks, dashboards, and cost analyses are welcome.
  - type: input
    id: link
    attributes:
      label: Link
      description: Notebook, repo, article, video, slides, or demo link.
    validations:
      required: false
  - type: textarea
    id: summary
    attributes:
      label: What did you build?
      description: Tell the community what you profiled, optimized, or discovered.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cost optimization
        - Token profiling
        - Multi-agent workflows
        - LangChain integration
        - CrewAI integration
        - Custom provider
        - CLI usage
        - Exporting / reporting
        - Teaching / workshop
        - Research / benchmarking
        - Other
    validations:
      required: false
