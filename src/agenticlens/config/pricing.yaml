# Bundled fallback pricing table (USD per 1,000 tokens).
#
# This is the last-resort safety net, only used when live pricing (see
# agenticlens.config.live_pricing) is disabled or unreachable and no cached
# live data exists. NOTE: prices drift frequently -- verify against each
# provider's current pricing page before a release.
#
# Keys are "<provider>:<model>". Resolution order is documented in
# AgenticLens_Spec.md under "Cost Metrics".

openai:gpt-4o:
  input_per_1k: 0.005
  output_per_1k: 0.015

openai:gpt-4o-mini:
  input_per_1k: 0.00015
  output_per_1k: 0.0006

anthropic:claude-3-5-sonnet:
  input_per_1k: 0.003
  output_per_1k: 0.015

anthropic:claude-3-5-haiku:
  input_per_1k: 0.0008
  output_per_1k: 0.004
